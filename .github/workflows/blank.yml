name: Daily Rate Scraper

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated rates.json
        run: |
          git config user.name  "OverExpansion Bot"
          git config user.email "bot@overexpansion.local"
          git add rates.json
          git diff --staged --quiet || git commit -m "chore: update rates $(date -u +%Y-%m-%d)"
          git push
